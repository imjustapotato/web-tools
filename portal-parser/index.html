<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Requisite Mapping</title>
    <link rel="stylesheet" href="../src/styles/tailwind.css">
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="../src/assets/logo100.png" type="image/png">
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body class="parser-page">
    <a href="/" class="home-fab" id="home-fab-btn" aria-label="Back to Homepage">
        <span class="iconify home-fab-icon" data-icon="mdi:home" aria-hidden="true"></span>
        <span class="home-fab-label">Back to Homepage</span>
    </a>

    <main class="app-shell">
        <header class="page-header">
            <h1 class="page-title">Pre-Requisite Mapping</h1>
            <p class="page-subtitle">
                Drag &amp; drop your Portal
                <code class="file-extension">.mhtml/.html</code>
                file to map your pre-reqs.
            </p>
        </header>

        <section id="dropzone" class="dropzone" aria-label="File upload dropzone">
            <div class="dropzone-content">
                <svg class="dropzone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <span class="dropzone-label">Drop Program Curriculum.mhtml or html file here</span>
            </div>
        </section>

        <section class="preset-loaders" aria-label="Preset curriculum loaders">
            <span class="preset-label">Or load a preset:</span>
            <div id="preset-buttons" class="preset-buttons" role="group" aria-label="Preset curriculum buttons"></div>
        </section>

        <section id="controls" class="controls is-hidden" aria-label="Graph controls">
            <div class="controls-group">
                <button id="copy-btn" class="btn btn-secondary" type="button">
                    Copy Mermaid Code
                </button>
                <button id="full-view-btn" class="btn btn-secondary" type="button">
                    Full Tree View
                </button>
                <button id="reset-btn" class="btn btn-danger" type="button">
                    Reset App
                </button>
            </div>

            <div class="viewport-tools" role="group" aria-label="Viewport controls">
                <span class="viewport-label">Viewport</span>
                <button id="zoom-out" class="icon-btn" type="button" aria-label="Zoom out">-</button>
                <button id="zoom-reset" class="btn btn-compact" type="button">Reset View</button>
                <button id="zoom-in" class="icon-btn" type="button" aria-label="Zoom in">+</button>
            </div>
        </section>

        <section id="graph-wrapper" class="graph-wrapper" aria-live="polite">
            <button id="deselect-btn-full" class="btn btn-secondary graph-deselect-btn" type="button"
                aria-label="Deselect Node">Deselect</button>
            <button id="full-view-close" class="icon-btn graph-close-btn" type="button" aria-label="Close full tree view">x</button>
            <aside id="summary-dock" class="summary-dock is-hidden" aria-label="Fullscreen prerequisite summary">
                <div class="summary-dock-header">
                    <h2 class="summary-dock-title">Complete the following subjects first to unlock:</h2>
                    <button id="summary-expand-btn" class="btn btn-compact is-hidden" aria-label="Toggle indirect prerequisites">Expand</button>
                </div>
                <p id="summary-subject-dock" class="summary-subject"></p>
                <ul id="summary-list-dock" class="summary-list"></ul>
                <div id="summary-indirect-container" class="is-hidden">
                    <h3 class="summary-dock-subtitle">Indirect Prerequisites:</h3>
                    <ul id="summary-indirect-list-dock" class="summary-list summary-list--indirect"></ul>
                </div>
            </aside>
            <div id="graph-container" class="graph-container">
                <p id="status-text" class="status-text">Waiting for MHTML/HTML file...</p>
            </div>
        </section>
    </main>

    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script type="module" src="../src/scripts/page-transition.js"></script>
    <script type="module" src="./script.js"></script>
    <script type="module" src="./network-bridge.js"></script>
    <script src="./companion-hook.js"></script>
</body>
</html>
