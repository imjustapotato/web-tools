<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Pre-Requisite Tree Parser</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="../src/assets/logo100.png" type="image/png">
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="parser-page">
    <a href="../index.html" class="home-fab" aria-label="Return to homepage">Home</a>

    <main class="app-shell">
        <header class="page-header">
            <h1 class="page-title">Curriculum Pre-Requisite Tree Parser</h1>
            <p class="page-subtitle">
                Drag &amp; drop your FEU Tech
                <code class="file-extension">.mhtml</code>
                file to map your pre-reqs.
            </p>
        </header>

        <section id="dropzone" class="dropzone" aria-label="File upload dropzone">
            <div class="dropzone-content">
                <svg class="dropzone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <span class="dropzone-label">Drop Program Curriculum.mhtml here</span>
            </div>
        </section>

        <section id="controls" class="controls is-hidden" aria-label="Graph controls">
            <div class="controls-group">
                <button id="copy-btn" class="btn btn-secondary" type="button">
                    Copy Mermaid Code
                </button>
                <button id="full-view-btn" class="btn btn-secondary" type="button">
                    Full Tree View
                </button>
                <button id="reset-btn" class="btn btn-danger" type="button">
                    Reset App
                </button>
            </div>

            <div class="viewport-tools" role="group" aria-label="Viewport controls">
                <span class="viewport-label">Viewport</span>
                <button id="zoom-out" class="icon-btn" type="button" aria-label="Zoom out">-</button>
                <button id="zoom-reset" class="btn btn-compact" type="button">Reset View</button>
                <button id="zoom-in" class="icon-btn" type="button" aria-label="Zoom in">+</button>
            </div>
        </section>

        <section id="graph-wrapper" class="graph-wrapper" aria-live="polite">
            <button id="full-view-close" class="icon-btn graph-close-btn" type="button" aria-label="Close full tree view">x</button>
            <div id="graph-container" class="graph-container">
                <p id="status-text" class="status-text">Waiting for MHTML file...</p>
            </div>
        </section>
    </main>

    <script src="../src/scripts/page-transition.js"></script>
    <script type="module" src="./script.js"></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
